<body class="bg-slate-100 dark:bg-black">
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M2C9JFRT" height="0" width="0"
      style="display: none; visibility: hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div id="root"></div>
  <link rel="apple-touch-icon" href="/hamza-logo.svg" />
  <script>
    let deferredPrompt;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          // Register the stable service worker
          await navigator.serviceWorker.register('/sw.js');
          console.log('SW registered successfully');
        } catch (error) {
          console.log('SW error:', error);
        }
      });

      // Capture install prompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

        // Show install button/banner after a small delay
        setTimeout(() => {
          showInstallBanner();
        }, 3000);
      });

      function showInstallBanner() {
        if (document.getElementById('pwa-install-banner')) return;

        const banner = document.createElement('div');
        banner.id = 'pwa-install-banner';
        banner.style.cssText = `
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          background: #4f46e5;
          color: white;
          padding: 12px 20px;
          border-radius: 12px;
          display: flex;
          align-items: center;
          gap: 15px;
          z-index: 9999;
          box-shadow: 0 10px 25px rgba(0,0,0,0.2);
          border: 1px solid rgba(255,255,255,0.1);
          font-family: 'Cairo', sans-serif;
          min-width: 300px;
          animation: slideUp 0.5s ease-out;
        `;

        banner.innerHTML = `
          <div style="flex-grow: 1">
            <div style="font-weight: bold; font-size: 14px">تثبيت التطبيق | Install App</div>
            <div style="font-size: 12px; opacity: 0.9">ثبته في هاتفك لسهولة الوصول</div>
          </div>
          <button id="pwa-install-btn" style="background: white; color: #4f46e5; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px">تثبيت</button>
          <button id="pwa-close-btn" style="background: transparent; color: white; border: none; font-size: 20px; cursor: pointer; padding: 0 5px">&times;</button>
        `;

        document.body.appendChild(banner);

        document.getElementById('pwa-install-btn').addEventListener('click', async () => {
          banner.style.display = 'none';
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response to install prompt: ${outcome}`);
            deferredPrompt = null;
          }
        });

        document.getElementById('pwa-close-btn').addEventListener('click', () => {
          banner.style.display = 'none';
        });

        // Add animation
        const style = document.createElement('style');
        style.textContent = `
          @keyframes slideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
          }
        `;
        document.head.appendChild(style);
      }
    }
  </script>
